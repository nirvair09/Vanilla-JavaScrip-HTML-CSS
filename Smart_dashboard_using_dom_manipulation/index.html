<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">DashBoard</div>

        <input type="text" placeholder="Search Product" id="searchBar">

        <div class="menu" id="menu">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Services</a>
            <a href="#">Contact</a>
        </div>

        <div class="hamburger" id="hamburger">☰</div>

    </nav>

    <div class="tabs">
        <div class="tab active" data-tab="tab1">Products</div>
        <div class="tab" data-tab="tab2">Services</div>
        <div class="tab" data-tab="tab3">About</div>
        <div class="tab" data-tab="tab4">Contact</div>
    </div>

    <div id="list"></div>
    
    <script src="script.js"></script>
</body>
</html>
