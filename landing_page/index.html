<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Product Landing</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header class="navbar">
      <div class="logo">NovaTech</div>
      <nav>
        <a href="#">Home</a>
        <a href="#">Features</a>
        <a href="#">Pricing</a>
        <a href="#">Contact</a>
      </nav>
    </header>

    <section class="hero">
      <div class="hero-content">
        <h1>The Future of Technology</h1>
        <p>Powerful. Elegant. Minimal.</p>
        <button>Buy Now</button>
      </div>
    </section>

    <section class="features">
      <h2>Features</h2>

      <div class="feature-grid">
        <div class="feature">
          <h3>Fast</h3>
          <p>Lightning fast performance.</p>
        </div>

        <div class="feature">
          <h3>Secure</h3>
          <p>Industry leading security.</p>
        </div>

        <div class="feature">
          <h3>Elegant</h3>
          <p>Designed for perfection.</p>
        </div>
      </div>
    </section>

    <section class="showcase">
      <div class="showcase-text">
        <h2>Designed to Impress</h2>
        <p>Precision engineering meets minimal design.</p>
      </div>

      <div class="showcase-image"></div>
    </section>

    <footer class="footer">
      <p>© 2026 NovaTech</p>
    </footer>
  </body>
</html>
