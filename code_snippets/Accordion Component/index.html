<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Accordion Components</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="accordion">
      <div class="item">
        <div class="question">What is the capital of France?</div>
        <div class="answer">The capital of France is Paris.</div>
      </div>

      <div class="item">
        <div class="question">What is the capital of Germany?</div>
        <div class="answer">The capital of Germany is Berlin.</div>
      </div>

      <div class="item">
        <div class="question">What is the capital of Japan?</div>
        <div class="answer">The capital of Japan is Tokyo.</div>
      </div>

      <div class="item">
        <div class="question">What is the capital of Russia?</div>
        <div class="answer">The capital of Russia is Moscow.</div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
